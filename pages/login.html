<body>
    <a href="../index.html"><img src="../src/logo1.png" alt="LOGO"></a>
    <section class="login">
        <h1>Bem-Vindo de Volta!</h1>

            <div class="input">
                <input type="email" name="email" id="emaili" required placeholder="">

            <div class="input">
                <input type="password" name="senha" id="senhai" required placeholder="">

            </div>

            <input type="submit" value="Logar">
        </form>

        <p class="count">Ainda não tem uma conta? <a href="criar-conta.html">Clique aqui para criar</a></p>

        <a class="voltar" href="../index.html"> <i class="fa-solid fa-arrow-left"></i>Voltar pro início</a>
    </section>
